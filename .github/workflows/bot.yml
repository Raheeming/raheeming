name: WhatsApp Crop Bot Scheduled Runner

on:
  # 🌟 يعمل فقط وحصرياً عندما يضغط العميل على زر التشغيل يدوياً
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot==21.3 opencv-python-headless numpy==1.26.4

    - name: Run Telegram Bot
      env:
        # تمرير التوكن المخفي بأمان للسيرفر
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      # يظل يعمل بشكل مستمر دون توقف حتى يقوم العميل بعمل إيقاف (Cancel) بنفسه
      run: python main.py
